<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress — BCS প্রস্তুতি</title>
<link rel="stylesheet" href="css/style.css">
<style>
.overview-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;margin-bottom:2rem; }
.ov-card { background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.5rem; }
.ov-top { display:flex;align-items:center;gap:12px;margin-bottom:1rem; }
.ov-icon { width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0; }
.ov-name { font-family:'Noto Serif Bengali',serif;font-size:1rem;font-weight:700; }
.ov-pct { font-size:.78rem;color:var(--muted); }
.ov-nums { display:flex;gap:10px;margin-top:.75rem;font-size:.78rem; }
.ov-n { padding:4px 10px;border-radius:8px;font-weight:600; }

.stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem; }
.stat-card { background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center; }
.stat-big { font-family:'Noto Serif Bengali',serif;font-size:2rem;font-weight:700;display:block; }
.stat-lbl { font-size:.75rem;color:var(--muted);margin-top:3px; }

.topic-detail { background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.5rem; }
.topic-row { display:flex;align-items:center;gap:12px;padding:.75rem 0;border-bottom:1px solid var(--border); }
.topic-row:last-child { border-bottom:none; }
.tr-name { flex:1;font-size:.9rem; }
.tr-prog { width:120px; }
.tr-pct { font-size:.78rem;color:var(--muted);min-width:44px;text-align:right; }

.reset-zone { margin-top:2rem;padding:1.25rem;background:var(--paper);border-radius:12px;text-align:center; }
.reset-zone p { font-size:.83rem;color:var(--muted);margin-bottom:.75rem; }

@media(max-width:600px){ .stats-row{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">BCS <span>প্রস্তুতি</span></a>
    <nav>
      <a class="nav-link" href="index.html"><span class="nav-icon">🏠</span>হোম</a>
      <a class="nav-link" href="questions.html"><span class="nav-icon">📚</span>প্রশ্নব্যাংক</a>
      <a class="nav-link" href="mock-test.html"><span class="nav-icon">✍️</span>মক টেস্ট</a>
      <a class="nav-link" href="flashcards.html"><span class="nav-icon">🃏</span>Flashcard</a>
      <a class="nav-link active" href="progress.html"><span class="nav-icon">📈</span>Progress</a>
      <a class="nav-link" href="ai-chat.html"><span class="nav-icon">🤖</span>AI সহায়তা</a>
    </nav>
  </div>
</header>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="hero-tag">আমার অগ্রগতি</div>
    <h1>📈 Progress Tracker</h1>
    <p>বিষয়ওয়ারি অগ্রগতি · দুর্বল টপিক চিহ্নিত করো</p>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>
  <div class="sec-head"><div class="sec-title">বিষয়ওয়ারি অগ্রগতি</div></div>
  <div class="overview-grid" id="overviewGrid"></div>
  <div class="sec-head"><div class="sec-title">টপিক-ভিত্তিক বিশ্লেষণ (আন্তর্জাতিক)</div></div>
  <div class="topic-detail" id="topicDetail"></div>
  <div class="reset-zone">
    <p>সব অগ্রগতি মুছে নতুনভাবে শুরু করতে চাইলে:</p>
    <button class="btn btn-ghost" onclick="resetAll()" style="color:var(--accent);border-color:var(--accent);">⚠️ সব Progress রিসেট করো</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/data.js"></script>
<script>
const prog = Progress.get();

function pct(d,t){ return t ? Math.round(d/t*100) : 0; }

// Overall stats
const done = Object.values(prog).filter(x=>x.status==='done').length;
const review = Object.values(prog).filter(x=>x.status==='review').length;
const total = QUESTIONS.length;
const fcStatus = JSON.parse(localStorage.getItem('bcs_fc_status')||'{}');
const fcKnown = Object.values(fcStatus).filter(x=>x==='known').length;

document.getElementById('statsRow').innerHTML = `
  <div class="stat-card"><span class="stat-big" style="color:var(--teal)">${done}</span><div class="stat-lbl">✅ সম্পন্ন প্রশ্ন</div></div>
  <div class="stat-card"><span class="stat-big" style="color:var(--gold)">${review}</span><div class="stat-lbl">🔁 রিভিউতে</div></div>
  <div class="stat-card"><span class="stat-big" style="color:var(--blue2)">${fcKnown}</span><div class="stat-lbl">🃏 Flashcard জানা</div></div>
  <div class="stat-card"><span class="stat-big" style="color:var(--accent)">${total-done}</span><div class="stat-lbl">⬜ বাকি আছে</div></div>`;

// By subject
document.getElementById('overviewGrid').innerHTML = SUBJECTS.map(s => {
  const sq = QUESTIONS.filter(q=>q.subject===s.id);
  const sd = sq.filter(q=>(prog[q.id]||{}).status==='done').length;
  const sr = sq.filter(q=>(prog[q.id]||{}).status==='review').length;
  const p = pct(sd,sq.length);
  return `
  <div class="ov-card">
    <div class="ov-top">
      <div class="ov-icon" style="background:${s.color};">${s.icon}</div>
      <div>
        <div class="ov-name">${s.label}</div>
        <div class="ov-pct">${sd}/${sq.length} প্রশ্ন সম্পন্ন</div>
      </div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${p}%"></div></div>
    <div class="ov-nums" style="margin-top:.75rem;">
      <span class="ov-n" style="background:#d1fae5;color:#065f46;">✅ ${sd}</span>
      <span class="ov-n" style="background:#fef3c7;color:#92400e;">🔁 ${sr}</span>
      <span class="ov-n" style="background:var(--paper2);color:var(--muted);">⬜ ${sq.length-sd-sr}</span>
    </div>
  </div>`;
}).join('');

// Topic detail (international)
const topics = [...new Set(QUESTIONS.filter(q=>q.subject==='international').map(q=>q.topic))];
document.getElementById('topicDetail').innerHTML = topics.map(t => {
  const tc = TOPIC_CONFIG[t]||{};
  const tq = QUESTIONS.filter(q=>q.topic===t);
  const td = tq.filter(q=>(prog[q.id]||{}).status==='done').length;
  const p = pct(td,tq.length);
  return `
  <div class="topic-row">
    <div class="tr-name"><span class="tag ${tc.cls||''}">${tc.label||t}</span></div>
    <div class="tr-prog"><div class="prog-bar-wrap"><div class="prog-bar" style="width:${p}%"></div></div></div>
    <div class="tr-pct">${td}/${tq.length} · ${p}%</div>
  </div>`;
}).join('');

function resetAll() {
  if (!confirm('সব Progress মুছে ফেলা হবে। নিশ্চিত?')) return;
  localStorage.removeItem('bcs_progress');
  localStorage.removeItem('bcs_fc_status');
  showToast('✓ Progress রিসেট হয়েছে');
  setTimeout(()=>location.reload(), 1000);
}
</script>
</body>
</html>
