<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মক টেস্ট — BCS প্রস্তুতি</title>
<link rel="stylesheet" href="css/style.css">
<style>
.test-setup { max-width:560px;margin:0 auto; }
.setup-card { background:#fff;border:1px solid var(--border);border-radius:14px;padding:2rem; }
.setup-card h2 { font-family:'Noto Serif Bengali',serif;font-size:1.4rem;margin-bottom:1.5rem; }
.setup-row { margin-bottom:1.25rem; }
.setup-row label { display:block;font-size:.85rem;font-weight:600;margin-bottom:.5rem;color:var(--muted); }
.setup-row select { padding:10px 14px;border-radius:9px; }

/* Test in progress */
.test-header { background:var(--ink);color:#fff;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold); }
.timer { font-family:'Noto Serif Bengali',serif;font-size:1.3rem;font-weight:700;color:var(--gold); }
.timer.warn { color:var(--accent2);animation:pulse 1s infinite; }
.q-progress { font-size:.82rem;opacity:.7; }

.test-body { max-width:700px;margin:0 auto;padding:2rem 1.5rem; }
.mcq-q { font-size:1rem;font-weight:500;line-height:1.75;margin-bottom:1.25rem; }
.mcq-opts { display:flex;flex-direction:column;gap:10px; }
.mcq-opt {
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:12px 16px;cursor:pointer;font-size:.92rem;line-height:1.6;
  transition:all .18s;display:flex;align-items:center;gap:10px;
}
.mcq-opt:hover { border-color:var(--blue2);background:#f0f7ff; }
.mcq-opt.selected { border-color:var(--blue);background:#e8f4ff; }
.mcq-opt.correct { border-color:var(--teal);background:#e8f8f3;pointer-events:none; }
.mcq-opt.wrong { border-color:var(--accent);background:#fdf0ef;pointer-events:none; }
.opt-letter { width:26px;height:26px;border-radius:50%;background:var(--paper2);font-size:.78rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.nav-row { display:flex;gap:10px;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap; }

/* Results */
.result-card { background:#fff;border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:600px;margin:0 auto; }
.result-score { text-align:center;margin-bottom:1.5rem; }
.score-big { font-family:'Noto Serif Bengali',serif;font-size:3.5rem;font-weight:700;color:var(--teal);display:block; }
.score-label { color:var(--muted);font-size:.9rem; }
.result-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem; }
.result-stat { text-align:center;padding:1rem;background:var(--paper);border-radius:10px; }
.rs-n { font-size:1.6rem;font-weight:700;font-family:'Noto Serif Bengali',serif; }
.rs-l { font-size:.75rem;color:var(--muted);margin-top:2px; }
.review-list { margin-top:1.25rem; }
.rv-item { background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.75rem; }
.rv-item.wrong-item { border-color:rgba(192,57,43,.25);background:#fdf8f8; }
.rv-q { font-size:.88rem;line-height:1.7;margin-bottom:.5rem; }
.rv-answer { font-size:.82rem; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">BCS <span>প্রস্তুতি</span></a>
    <nav>
      <a class="nav-link" href="index.html"><span class="nav-icon">🏠</span>হোম</a>
      <a class="nav-link" href="questions.html"><span class="nav-icon">📚</span>প্রশ্নব্যাংক</a>
      <a class="nav-link active" href="mock-test.html"><span class="nav-icon">✍️</span>মক টেস্ট</a>
      <a class="nav-link" href="flashcards.html"><span class="nav-icon">🃏</span>Flashcard</a>
      <a class="nav-link" href="progress.html"><span class="nav-icon">📈</span>Progress</a>
      <a class="nav-link" href="ai-chat.html"><span class="nav-icon">🤖</span>AI সহায়তা</a>
    </nav>
  </div>
</header>

<div id="setupView">
  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="hero-tag">পরীক্ষা মোড</div>
      <h1>✍️ মক টেস্ট</h1>
      <p>সময়-নিয়ন্ত্রিত MCQ পরীক্ষা · স্বয়ংক্রিয় মূল্যায়ন</p>
    </div>
  </div>
  <div class="container">
    <div class="test-setup">
      <div class="setup-card anim-up">
        <h2>পরীক্ষার সেটআপ</h2>
        <div class="setup-row">
          <label>বিষয়</label>
          <select id="subjectSelect">
            <option value="all">সব বিষয়</option>
            <option value="international">আন্তর্জাতিক বিষয়াবলি</option>
            <option value="bangladesh">বাংলাদেশ বিষয়াবলি</option>
            <option value="bangla">বাংলা ভাষা ও সাহিত্য</option>
            <option value="english">English Language</option>
            <option value="math">গণিত</option>
            <option value="science">সাধারণ বিজ্ঞান</option>
          </select>
        </div>
        <div class="setup-row">
          <label>প্রশ্ন সংখ্যা</label>
          <select id="countSelect">
            <option value="5">৫টি</option>
            <option value="10" selected>১০টি</option>
            <option value="15">১৫টি</option>
            <option value="20">২০টি (সব)</option>
          </select>
        </div>
        <div class="setup-row">
          <label>সময়সীমা</label>
          <select id="timeSelect">
            <option value="0">সময়সীমা নেই</option>
            <option value="5">৫ মিনিট</option>
            <option value="10" selected>১০ মিনিট</option>
            <option value="15">১৫ মিনিট</option>
            <option value="20">২০ মিনিট</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startTest()" style="width:100%;font-size:.95rem;padding:12px;">পরীক্ষা শুরু করো →</button>
      </div>
    </div>
  </div>
</div>

<div id="testView" style="display:none;">
  <div class="test-header">
    <span class="q-progress" id="qProg">প্রশ্ন ১/১০</span>
    <span class="timer" id="timerDisplay">--:--</span>
    <button class="btn btn-ghost" onclick="endTest()" style="font-size:.78rem;padding:5px 12px;color:#fff;border-color:rgba(255,255,255,.3);">শেষ করো</button>
  </div>
  <div class="test-body">
    <div class="prog-bar-wrap" style="margin-bottom:1.5rem;">
      <div class="prog-bar" id="testProg" style="background:var(--gold);width:0%"></div>
    </div>
    <div id="testContent"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="prevQ()" id="prevBtn">← আগের প্রশ্ন</button>
      <button class="btn btn-primary" onclick="nextQ()" id="nextBtn">পরের প্রশ্ন →</button>
    </div>
  </div>
</div>

<div id="resultView" style="display:none;">
  <div class="page-hero">
    <div class="page-hero-inner"><h1>ফলাফল</h1></div>
  </div>
  <div class="container">
    <div class="result-card anim-up">
      <div class="result-score">
        <span class="score-big" id="scoreDisplay">০/০</span>
        <span class="score-label">সঠিক উত্তর</span>
      </div>
      <div class="result-grid">
        <div class="result-stat"><div class="rs-n" id="rCorrect" style="color:var(--teal)">০</div><div class="rs-l">✅ সঠিক</div></div>
        <div class="result-stat"><div class="rs-n" id="rWrong" style="color:var(--accent)">০</div><div class="rs-l">❌ ভুল</div></div>
        <div class="result-stat"><div class="rs-n" id="rSkip" style="color:var(--gold)">০</div><div class="rs-l">⬜ এড়িয়ে</div></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="location.reload()" style="flex:1;">🔄 আবার দাও</button>
        <a href="questions.html" class="btn btn-ghost" style="flex:1;text-align:center;">📚 প্রশ্নব্যাংকে যাও</a>
      </div>
      <div class="review-list" id="reviewList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/data.js"></script>
<script>
let testQs = [], curIdx = 0, answers = {}, timer = null, timeLeft = 0;

function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }

function startTest() {
  const sub = document.getElementById('subjectSelect').value;
  const cnt = parseInt(document.getElementById('countSelect').value);
  const mins = parseInt(document.getElementById('timeSelect').value);

  // Get MCQ questions only
  let pool = QUESTIONS.filter(q => q.mcq && q.mcq.length > 0);
  if (sub !== 'all') pool = pool.filter(q => q.subject === sub);

  // Flatten to individual MCQ items
  let items = [];
  pool.forEach(q => q.mcq.forEach((m,i) => items.push({ qId:q.id, idx:i, q:m.q, opts:m.opts, ans:m.ans, subject:q.subject, topic:q.topic })));

  if (!items.length) { showToast('এই বিষয়ে MCQ প্রশ্ন নেই'); return; }

  testQs = shuffle(items).slice(0, Math.min(cnt, items.length));
  curIdx = 0; answers = {};

  document.getElementById('setupView').style.display = 'none';
  document.getElementById('testView').style.display = 'block';

  if (mins > 0) {
    timeLeft = mins * 60;
    timer = setInterval(() => {
      timeLeft--;
      const m = Math.floor(timeLeft/60), s = timeLeft%60;
      const el = document.getElementById('timerDisplay');
      el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if (timeLeft <= 60) el.classList.add('warn');
      if (timeLeft <= 0) { clearInterval(timer); endTest(); }
    }, 1000);
  } else {
    document.getElementById('timerDisplay').textContent = '∞';
  }
  renderTestQ();
}

function renderTestQ() {
  const q = testQs[curIdx];
  const total = testQs.length;
  document.getElementById('qProg').textContent = `প্রশ্ন ${curIdx+1}/${total}`;
  document.getElementById('testProg').style.width = ((curIdx+1)/total*100)+'%';
  document.getElementById('prevBtn').disabled = curIdx === 0;
  document.getElementById('nextBtn').textContent = curIdx === total-1 ? 'ফলাফল দেখো ✓' : 'পরের প্রশ্ন →';

  const sel = answers[curIdx];
  const letters = ['ক','খ','গ','ঘ'];
  document.getElementById('testContent').innerHTML = `
    <div class="card" style="margin-bottom:1.25rem;">
      <div class="mcq-q">${curIdx+1}. ${q.q}</div>
      <div class="mcq-opts">
        ${q.opts.map((o,i) => `
          <div class="mcq-opt ${sel===i?'selected':''}" onclick="selectOpt(${i})" id="opt-${i}">
            <div class="opt-letter">${letters[i]}</div>
            <span>${o}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function selectOpt(i) { answers[curIdx] = i; renderTestQ(); }
function prevQ() { if (curIdx>0) { curIdx--; renderTestQ(); } }
function nextQ() {
  if (curIdx < testQs.length-1) { curIdx++; renderTestQ(); }
  else endTest();
}

function endTest() {
  clearInterval(timer);
  document.getElementById('testView').style.display='none';
  document.getElementById('resultView').style.display='block';

  let correct=0, wrong=0, skip=0;
  const letters=['ক','খ','গ','ঘ'];
  const reviewHTML = testQs.map((q,i) => {
    const chosen = answers[i];
    const isCorrect = chosen === q.ans;
    const isSkip = chosen === undefined;
    if (isCorrect) correct++;
    else if (isSkip) skip++;
    else wrong++;
    const cls = isCorrect?'':'wrong-item';
    const icon = isCorrect?'✅':isSkip?'⬜':'❌';
    return `<div class="rv-item ${cls}">
      <div class="rv-q"><strong>${icon} ${i+1}.</strong> ${q.q}</div>
      <div class="rv-answer">
        ${!isSkip?`<span style="color:${isCorrect?'var(--teal)':'var(--accent)'}">তোমার উত্তর: ${letters[chosen]} — ${q.opts[chosen]}</span><br>`:'<span style="color:var(--gold)">এড়িয়ে গেছ</span><br>'}
        <span style="color:var(--teal)">সঠিক উত্তর: ${letters[q.ans]} — ${q.opts[q.ans]}</span>
      </div>
    </div>`;
  }).join('');

  const total = testQs.length;
  document.getElementById('scoreDisplay').textContent = `${correct}/${total}`;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkip').textContent = skip;
  document.getElementById('reviewList').innerHTML = `<h3 style="font-family:'Noto Serif Bengali',serif;margin:1.5rem 0 1rem;">প্রশ্নওয়ারি পর্যালোচনা</h3>${reviewHTML}`;
}
</script>
</body>
</html>
